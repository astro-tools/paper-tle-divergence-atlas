# This file configures ruff/pytest for the figure scripts and sweep code.
# This repo is NOT a Python package -- it is a paper artifact.
# The build environment is defined in environment.yml.

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [".snakemake", ".showyourwork", "outputs", "src/tex/figures"]

[tool.ruff.lint]
select = [
  "E", "W",   # pycodestyle
  "F",        # pyflakes
  "I",        # isort
  "N",        # pep8-naming
  "UP",       # pyupgrade
  "B",        # bugbear
  "SIM",      # simplify
  "C4",       # comprehensions
  "PD",       # pandas
  "NPY",      # numpy
]
ignore = [
  "E501",     # line length (handled by formatter)
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra -q"
