# showyourwork configuration
# https://show-your.work/en/v0.4.3/config/

# Manuscript filename (without extension): compiles src/tex/ms.tex
ms_name: ms

# Verbose Snakemake output during build (useful for debugging)
verbose: false

# Require all output files to be programmatically generatable
require_inputs: true

# Zenodo datasets fetched on build.
#
# Keyed by the *version* DOI (showyourwork rejects concept DOIs at
# preprocess time so the snapshot is locked). The current entry points
# at the v0.1.0 production Zenodo deposit holding the canonical
# bundle.zip produced by `make bundle` (aggregated main sweep,
# CdA/maneuver-threshold sensitivity-subset frames, mixed-effects
# supplement, plus analysis summaries and the truth-floor diagnostic).
# The concept DOI (10.5281/zenodo.20277028) is the citable, version-
# stable identifier used in the manuscript and CITATION.cff; this
# key is the version DOI of the specific v0.1.0 snapshot.
#
# The single deposit artefact is bundle.zip; per showyourwork's
# zip-deposit syntax, each archive entry is addressed as
# `<archive-name>/<entry-name>`. showyourwork downloads the archive
# once and extracts the named entries to their target paths.
datasets:
  10.5281/zenodo.20277029:
    contents:
      bundle.zip/all_runs.parquet: outputs/all_runs.parquet
      bundle.zip/all_runs_cda_low.parquet: outputs/all_runs_cda_low.parquet
      bundle.zip/all_runs_cda_high.parquet: outputs/all_runs_cda_high.parquet
      bundle.zip/all_runs_maneuver_augment.parquet: outputs/all_runs_maneuver_augment.parquet
      bundle.zip/tles_cache_50m.parquet: outputs/tles_cache_50m.parquet
      bundle.zip/tles_cache_200m.parquet: outputs/tles_cache_200m.parquet
      bundle.zip/propagator_wins.json: outputs/propagator_wins.json
      bundle.zip/h3_regression.json: outputs/h3_regression.json
      bundle.zip/cda_sensitivity_summary.json: outputs/cda_sensitivity_summary.json
      bundle.zip/maneuver_threshold_summary.json: outputs/maneuver_threshold_summary.json
      bundle.zip/mixed_effects_results.csv: outputs/mixed_effects_results.csv
      bundle.zip/sweep_stats.txt: outputs/sweep_stats.txt
      bundle.zip/_truth_floor.parquet: outputs/_truth_floor.parquet
      bundle.zip/_truth_floor.json: outputs/_truth_floor.json

# Per-script dependencies. Add entries as figures land.
dependencies:
  src/scripts/fig_constellation_map.py:
    - src/static/tles_cache.parquet
  src/scripts/fig_sgp4_growth.py:
    - outputs/all_runs.parquet
  src/scripts/fig_hifi_growth.py:
    - outputs/all_runs.parquet
  src/scripts/fig_propagator_scatter.py:
    - outputs/all_runs.parquet
  src/scripts/fig_propagator_scatter_hexbin.py:
    - outputs/all_runs.parquet
  src/scripts/fig_powerlaw_fits.py:
    - outputs/all_runs.parquet
  src/scripts/fig_error_decomposition.py:
    - outputs/all_runs.parquet
  src/scripts/fig_solar_modulation.py:
    - outputs/all_runs.parquet
    - src/static/sw_cache.parquet
    - src/scripts/_h3_regression.py
  src/scripts/fig_maneuver_filter.py:
    - src/static/maneuver_jumps.parquet
