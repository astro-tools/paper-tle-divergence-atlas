name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build the manuscript
        uses: showyourwork/showyourwork-action@v1
        with:
          conda-cache-number: 0
          showyourwork-spec: ">=0.4,<0.5"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: manuscript
          path: src/tex/ms.pdf
